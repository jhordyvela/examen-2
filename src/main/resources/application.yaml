spring:
  application:
    name: api-orders

  datasource:
    url: jdbc:h2:mem:ordersdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true # Opcional: para que los alumnos vean las consultas en consola

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080